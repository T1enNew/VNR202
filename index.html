<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Cương lĩnh xây dựng đất nước trong thời kỳ quá độ lên CNXH</title>
<style>
:root{
  --paper:#F3E9CF; --paper-2:#EADFBF; --paper-edge:#DCCB9F;
  --ink:#2A2018; --ink-soft:#5C4B39; --ink-faint:#8A765C;
  --red:#7C1614; --red-deep:#570D0C; --red-bright:#9A2320;
  --gold:#C9A24B; --gold-bright:#E0BE68; --gold-deep:#9C7A2E;
  --line:rgba(42,32,24,.16);
  --serif:"Cambria","Iowan Old Style","Palatino Linotype","Georgia","Times New Roman",serif;
  --sans:"Segoe UI","Be Vietnam Pro","Helvetica Neue",system-ui,-apple-system,"Segoe UI",sans-serif;
  color-scheme: light;
}
*{box-sizing:border-box}
html,body{height:100%}
body{
  margin:0; font-family:var(--sans); color:var(--ink);
  background:
    radial-gradient(120% 90% at 50% 12%, #3a1512 0%, #2a0f0d 45%, #1a0908 100%);
  overflow:hidden; -webkit-font-smoothing:antialiased;
}

/* ---------- stage & book ---------- */
.viewport{position:fixed; inset:0; display:flex; align-items:center; justify-content:center;}
.stage{ --PW:560px; --PH:720px; width:calc(var(--PW)*2); height:var(--PH);
  transform-origin:center center; will-change:transform;}
.book{position:relative; width:100%; height:100%; perspective:2600px;}

/* stacked page-edges to fake thickness */
.book::before,.book::after{content:""; position:absolute; top:6px; bottom:6px; width:16px; z-index:0;
  background:repeating-linear-gradient(90deg,#d9c9a0 0 1px,#efe4c6 1px 3px);
  box-shadow:0 22px 50px rgba(0,0,0,.5);}
.book::before{left:-14px; border-radius:6px 0 0 6px;}
.book::after{right:-14px; border-radius:0 6px 6px 0;}

.pageBase{position:absolute; top:0; height:100%; width:50%; overflow:hidden;
  background:linear-gradient(var(--paper),var(--paper-2));}
.pageBase.left{left:0; border-radius:6px 0 0 6px;
  box-shadow:inset -26px 0 40px -26px rgba(60,40,20,.55), 0 22px 50px rgba(0,0,0,.45);}
.pageBase.left .wm{position:absolute; inset:0; display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:22px; opacity:.5;}
.pageBase.left .wm .star{width:120px;height:120px;color:var(--gold-deep);opacity:.6}
.pageBase.left .wm .vtitle{writing-mode:vertical-rl; font-family:var(--serif); letter-spacing:.28em;
  text-transform:uppercase; font-size:14px; color:var(--ink-faint);}

/* ---------- leaves (flipping pages) ---------- */
.leaf{position:absolute; top:0; left:50%; width:50%; height:100%;
  transform-origin:left center; transform-style:preserve-3d;
  transition:transform .95s cubic-bezier(.4,.05,.2,1);}
.leaf.flip{transform:rotateY(-180deg);}
.leaf .face{position:absolute; inset:0; backface-visibility:hidden; -webkit-backface-visibility:hidden;
  overflow:hidden; border-radius:0 6px 6px 0;}
.leaf .front{background:linear-gradient(120deg,var(--paper) 0%,var(--paper-2) 100%);
  box-shadow:inset 26px 0 40px -26px rgba(60,40,20,.5);}
.leaf .back{transform:rotateY(180deg);
  background:linear-gradient(-120deg,var(--paper) 0%,var(--paper-2) 100%);
  box-shadow:inset -26px 0 40px -26px rgba(60,40,20,.5);}
.leaf .back .bwm{position:absolute; inset:0; display:flex; align-items:center; justify-content:center;}
.leaf .back .bwm .star{width:150px;height:150px;color:var(--gold);opacity:.14}
/* subtle turning shadow near the gutter */
.leaf .front::after{content:""; position:absolute; inset:0; pointer-events:none;
  background:linear-gradient(90deg, rgba(60,40,20,.16), rgba(60,40,20,0) 14%);}

/* ---------- page content ---------- */
.pg{position:absolute; inset:0; padding:56px 54px 64px; display:flex; flex-direction:column;}
.eyebrow{font-size:13px; letter-spacing:.22em; text-transform:uppercase; color:var(--gold-deep); font-weight:700;
  display:flex; align-items:center; gap:10px;}
.eyebrow::before{content:""; width:26px; height:2px; background:var(--gold-deep);}
.title{font-family:var(--serif); color:var(--red); font-weight:700; line-height:1.08;
  font-size:38px; margin:16px 0 4px; text-wrap:balance;}
.title.sm{font-size:31px;}
.lead{font-size:18px; color:var(--ink-soft); line-height:1.5; margin-top:6px; max-width:44ch;}
.rule{height:2px; width:70px; background:var(--gold); margin:18px 0 6px; border-radius:2px;}
.spacer{flex:1}
.points{list-style:none; margin:20px 0 0; padding:0; display:flex; flex-direction:column; gap:16px;}
.points li{position:relative; padding-left:30px; font-size:22px; line-height:1.34; color:var(--ink);}
.points li::before{content:""; position:absolute; left:2px; top:.52em; width:11px; height:11px;
  background:var(--gold); transform:rotate(45deg); box-shadow:0 0 0 3px rgba(201,162,75,.2);}
.points li b{color:var(--red); font-weight:700;}
.points li small{display:block; font-size:15px; color:var(--ink-faint); line-height:1.35; margin-top:2px;}
.callout{margin-top:16px; padding:16px 20px; border-left:4px solid var(--red);
  background:rgba(124,22,20,.06); border-radius:0 8px 8px 0; font-family:var(--serif);
  font-size:20px; line-height:1.4; color:var(--red-deep); font-style:italic;}
.foot{position:absolute; left:54px; right:54px; bottom:26px; display:flex; justify-content:space-between;
  align-items:center; font-size:12px; letter-spacing:.14em; text-transform:uppercase; color:var(--ink-faint);
  border-top:1px solid var(--line); padding-top:10px;}

/* grids */
.grid6{display:grid; grid-template-columns:1fr 1fr 1fr; gap:12px; margin-top:22px;}
.cell{background:rgba(255,255,255,.42); border:1px solid var(--line); border-radius:12px; padding:14px 14px 15px;
  box-shadow:0 6px 14px rgba(80,50,20,.06);}
.cell .k{font-family:var(--serif); color:var(--red); font-weight:700; font-size:18px; margin-bottom:4px;}
.cell .v{font-size:14.5px; line-height:1.32; color:var(--ink-soft);}
.grid8{display:grid; grid-template-columns:1fr 1fr; gap:12px 16px; margin-top:20px;}
.pw{display:flex; gap:14px; align-items:flex-start;}
.pw .n{flex:none; width:34px; height:34px; border-radius:50%; background:var(--red); color:var(--gold-bright);
  font-family:var(--serif); font-weight:700; display:flex; align-items:center; justify-content:center; font-size:18px;
  box-shadow:0 3px 8px rgba(124,22,20,.35);}
.pw .t{font-size:16px; line-height:1.3; padding-top:3px;}
.rel{list-style:none; margin:18px 0 0; padding:0; display:flex; flex-direction:column; gap:12px;}
.rel li{font-size:17px; line-height:1.3; padding-left:18px; position:relative;}
.rel li::before{content:"◆"; position:absolute; left:0; top:1px; color:var(--gold-deep); font-size:11px;}
.rel b{color:var(--red);}

/* timeline */
.tl{display:flex; flex-direction:column; gap:18px; margin-top:26px;}
.tl .row{display:flex; gap:18px; align-items:flex-start;}
.tl .yr{flex:none; width:96px; text-align:right; font-family:var(--serif); color:var(--red); font-weight:700;
  font-size:34px; line-height:1;}
.tl .yr small{display:block; font-family:var(--sans); font-weight:600; font-size:11px; letter-spacing:.04em;
  color:var(--ink-faint); margin-top:4px; text-transform:none;}
.tl .dot{flex:none; position:relative; width:16px; align-self:stretch;}
.tl .dot::before{content:""; position:absolute; left:50%; top:6px; transform:translateX(-50%);
  width:14px; height:14px; border-radius:50%; background:var(--gold); border:3px solid var(--red); z-index:2;}
.tl .dot::after{content:""; position:absolute; left:50%; top:6px; bottom:-18px; transform:translateX(-50%);
  width:2px; background:var(--gold-deep); opacity:.5;}
.tl .row:last-child .dot::after{display:none;}
.tl .txt{font-size:17px; line-height:1.34; padding-top:4px;}
.tl .txt b{color:var(--red);}

/* red divider / cover / final variants */
.front.red,.front.cover,.front.final{background:
  radial-gradient(120% 100% at 30% 0%, var(--red-bright) 0%, var(--red) 42%, var(--red-deep) 100%);}
.front.red .pg,.front.cover .pg,.front.final .pg{color:#F6E9C9;}
.front.red::after{background:linear-gradient(90deg,rgba(0,0,0,.28),rgba(0,0,0,0) 14%);}
.divi{height:100%; display:flex; flex-direction:column; justify-content:center; gap:8px;}
.divi .part{font-size:14px; letter-spacing:.3em; text-transform:uppercase; color:var(--gold-bright); font-weight:700;}
.divi .bignum{font-family:var(--serif); font-size:150px; line-height:.85; color:var(--gold-bright);
  text-shadow:0 6px 24px rgba(0,0,0,.35); margin:6px 0 4px;}
.divi h2{font-family:var(--serif); font-size:40px; line-height:1.05; margin:0; color:#FBF1D6; text-wrap:balance;}
.divi p{font-size:19px; color:#EBD9AE; margin:10px 0 0; max-width:40ch; line-height:1.45;}

/* cover */
.cover-in{height:100%; display:flex; flex-direction:column; justify-content:center; align-items:center; text-align:center; gap:16px;}
.cover-in .star{width:96px; height:96px; color:var(--gold-bright); filter:drop-shadow(0 6px 16px rgba(0,0,0,.4));}
.cover-in .eb{font-size:13px; letter-spacing:.26em; text-transform:uppercase; color:var(--gold-bright); font-weight:700;}
.cover-in h1{font-family:var(--serif); font-size:44px; line-height:1.08; margin:6px 22px 0; color:#FBF1D6; text-wrap:balance;
  text-shadow:0 4px 18px rgba(0,0,0,.35);}
.cover-in h1 span{display:block; color:var(--gold-bright); font-size:30px; margin-top:8px; font-weight:600;}
.cover-in .yrs{font-family:var(--serif); font-size:22px; letter-spacing:.2em; color:#EBD9AE; margin-top:6px;}
.cover-in .frame{position:absolute; inset:26px; border:2px solid rgba(224,190,104,.5); border-radius:8px; pointer-events:none;}
.cover-in .hint{position:absolute; bottom:34px; left:0; right:0; font-family:var(--sans); font-size:13px;
  letter-spacing:.16em; text-transform:uppercase; color:var(--gold-bright); opacity:.85;
  display:flex; gap:8px; align-items:center; justify-content:center; animation:pulse 2.4s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:.5}50%{opacity:1}}

.final-in{height:100%; display:flex; flex-direction:column; justify-content:center; align-items:center; text-align:center; gap:18px;}
.final-in .star{width:80px;height:80px;color:var(--gold-bright)}
.final-in h2{font-family:var(--serif); font-size:40px; color:#FBF1D6; margin:0 20px; text-wrap:balance; line-height:1.15;}
.final-in p{color:#EBD9AE; font-size:18px; margin:0;}
.final-in .team{margin-top:10px; font-size:14px; letter-spacing:.14em; text-transform:uppercase; color:var(--gold-bright);}

/* ---------- chrome (controls) ---------- */
.bar{position:fixed; left:0; right:0; bottom:0; height:4px; background:rgba(255,255,255,.12); z-index:40;}
.bar > i{display:block; height:100%; width:0; background:linear-gradient(90deg,var(--gold-deep),var(--gold-bright));
  transition:width .5s cubic-bezier(.4,.05,.2,1);}
.ctrl{position:fixed; z-index:41; bottom:20px; left:50%; transform:translateX(-50%);
  display:flex; align-items:center; gap:14px; padding:8px 10px; border-radius:999px;
  background:rgba(30,12,10,.55); backdrop-filter:blur(8px); border:1px solid rgba(224,190,104,.28);
  color:#F3E4C3; font-size:13px; letter-spacing:.06em;}
.ctrl button{all:unset; cursor:pointer; width:34px; height:34px; border-radius:50%; display:flex;
  align-items:center; justify-content:center; color:#F3E4C3; transition:background .2s, transform .1s;}
.ctrl button:hover{background:rgba(224,190,104,.18);}
.ctrl button:active{transform:scale(.92);}
.ctrl button:focus-visible{outline:2px solid var(--gold-bright); outline-offset:2px;}
.ctrl .count{min-width:78px; text-align:center; font-variant-numeric:tabular-nums; font-family:var(--serif);}
.ctrl .count b{color:var(--gold-bright); font-size:16px;}
.fs{position:fixed; top:18px; right:18px; z-index:41; all:unset; cursor:pointer;
  width:40px; height:40px; border-radius:50%; display:flex; align-items:center; justify-content:center;
  background:rgba(30,12,10,.5); border:1px solid rgba(224,190,104,.28); color:#F3E4C3; backdrop-filter:blur(8px);}
.fs:hover{background:rgba(224,190,104,.18);}
.fs:focus-visible{outline:2px solid var(--gold-bright); outline-offset:2px;}
.toast{position:fixed; top:18px; left:50%; transform:translateX(-50%); z-index:41;
  background:rgba(30,12,10,.6); color:#F3E4C3; border:1px solid rgba(224,190,104,.28); backdrop-filter:blur(8px);
  padding:9px 18px; border-radius:999px; font-size:13px; letter-spacing:.05em; transition:opacity .6s; opacity:1;}
.toast.hide{opacity:0;}
.click-zone{position:absolute; top:0; height:100%; width:50%; z-index:800; cursor:pointer;}
.click-zone.next{right:0;} .click-zone.prev{left:0;}

@media (prefers-reduced-motion: reduce){ .leaf{transition:transform .01s linear;} .bar>i{transition:none;} .cover-in .hint{animation:none;} }
@media (max-width:560px){ .ctrl{bottom:14px;} }
</style>
</head>

<svg width="0" height="0" style="position:absolute" aria-hidden="true">
  <symbol id="star" viewBox="0 0 100 100">

<div class="viewport">

<button class="fs" id="fsBtn" title="Toàn màn hình (F)" aria-label="Toàn màn hình">

</button>

  <button id="next" title="Trang sau (→)" aria-label="Trang sau">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg>
  </button>
</div>

<div class="bar"><i id="barfill"></i></div>
<div class="toast" id="toast">Phím <b>→</b> / <b>←</b> để lật trang · <b>F</b> toàn màn hình · Bấm mép trang để chuyển</div>

/* ---------- build ---------- */
const book = document.getElementById('book');
const N = slides.length;
document.getElementById('tot').textContent = N;
const leaves = [];
slides.forEach((s,i)=>{
  const leaf = document.createElement('div');
  leaf.className = 'leaf';
  leaf.innerHTML =
    `<div class="face front ${s.v}">${s.html}</div>`+
    `<div class="face back"><div class="bwm">${STAR}</div></div>`;
  book.appendChild(leaf);
  leaves.push(leaf);
});

let cur = 0;          // index of the top page shown on the right
let flippingId = -1;  // leaf currently animating (kept on top)

function render(){
  leaves.forEach((leaf,i)=>{
    const flipped = i < cur;
    leaf.classList.toggle('flip', flipped);
    let z = flipped ? (500 + i) : (200 + (N - i));
    if(i === flippingId) z = 1000;
    leaf.style.zIndex = z;
    leaf.setAttribute('aria-hidden', i===cur ? 'false' : 'true');
  });
  document.getElementById('cur').textContent = cur+1;
  document.getElementById('barfill').style.width = (cur/(N-1)*100)+'%';
}

function go(dir){
  const target = cur + dir;
  if(target < 0 || target > N-1) return;
  // the leaf that actually turns:
  flippingId = dir > 0 ? cur : target;
  cur = target;
  render();
}
function next(){ go(1); } function prev(){ go(-1); }

leaves.forEach(l=>l.addEventListener('transitionend', e=>{
  if(e.propertyName==='transform'){ flippingId=-1; render(); }
}));

/* ---------- controls ---------- */
document.getElementById('next').onclick = next;
document.getElementById('prev').onclick = prev;

// click zones on the pages
const zNext = document.createElement('div'); zNext.className='click-zone next'; zNext.onclick=next;
const zPrev = document.createElement('div'); zPrev.className='click-zone prev'; zPrev.onclick=prev;
book.appendChild(zPrev); book.appendChild(zNext);

document.addEventListener('keydown', e=>{
  if(e.key==='ArrowRight'||e.key==='PageDown'||e.key===' '){ e.preventDefault(); next(); }
  else if(e.key==='ArrowLeft'||e.key==='PageUp'){ e.preventDefault(); prev(); }
  else if(e.key==='Home'){ cur=0; flippingId=-1; render(); }
  else if(e.key==='End'){ cur=N-1; flippingId=-1; render(); }
  else if(e.key==='f'||e.key==='F'){ toggleFs(); }
});

// swipe
let sx=null;
book.addEventListener('touchstart',e=>sx=e.touches[0].clientX,{passive:true});
book.addEventListener('touchend',e=>{ if(sx===null)return; const dx=e.changedTouches[0].clientX-sx;
  if(Math.abs(dx)>40){ dx<0?next():prev(); } sx=null; });

// fullscreen
function toggleFs(){ if(!document.fullscreenElement){ document.documentElement.requestFullscreen?.(); }
  else { document.exitFullscreen?.(); } }
document.getElementById('fsBtn').onclick = toggleFs;

// scale-to-fit
const stage = document.getElementById('stage');
function fit(){
  const SPREAD = 1120, PH = 720;
  const s = Math.min((innerWidth*0.96)/SPREAD, (innerHeight*0.84)/PH);
  stage.style.transform = `scale(${s})`;
}
addEventListener('resize', fit); fit();

// hint toast
setTimeout(()=>document.getElementById('toast').classList.add('hide'), 4200);

render();
</script>
