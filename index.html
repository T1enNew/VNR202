<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Cương lĩnh xây dựng đất nước trong thời kỳ quá độ lên CNXH</title>
<style>
:root{
  --paper:#F3E9CF; --paper-2:#EADFBF;
  --ink:#2A2018; --ink-soft:#5C4B39; --ink-faint:#8A765C;
  --red:#7C1614; --red-deep:#570D0C; --red-bright:#9A2320;
  --gold:#C9A24B; --gold-bright:#E0BE68; --gold-deep:#9C7A2E;
  --line:rgba(42,32,24,.16);
  --serif:"Cambria","Iowan Old Style","Palatino Linotype","Georgia","Times New Roman",serif;
  --sans:"Segoe UI","Be Vietnam Pro","Helvetica Neue",system-ui,-apple-system,sans-serif;
  color-scheme: light;
}
*{box-sizing:border-box}
html,body{height:100%}
body{
  margin:0; font-family:var(--sans); color:var(--ink);
  background:radial-gradient(120% 90% at 50% 12%, #3a1512 0%, #2a0f0d 45%, #1a0908 100%);
  overflow:hidden; -webkit-font-smoothing:antialiased;
}

/* ---------- stage & book ---------- */
.viewport{position:fixed; inset:0; display:flex; align-items:center; justify-content:center;}
.stage{ --PH:720px; width:1120px; height:var(--PH); transform-origin:center center; will-change:transform;}
.book{position:relative; width:100%; height:100%; perspective:2800px;}
.book::before,.book::after{content:""; position:absolute; top:6px; bottom:6px; width:16px; z-index:0;
  background:repeating-linear-gradient(90deg,#d9c9a0 0 1px,#efe4c6 1px 3px); box-shadow:0 22px 50px rgba(0,0,0,.5);}
.book::before{left:-14px; border-radius:6px 0 0 6px;}
.book::after{right:-14px; border-radius:0 6px 6px 0;}
/* soft spine shadow down the middle */
.book .spine{position:absolute; top:0; bottom:0; left:50%; width:60px; transform:translateX(-50%); z-index:400;
  pointer-events:none; background:linear-gradient(90deg, rgba(60,40,20,0), rgba(60,40,20,.22) 48%, rgba(60,40,20,.22) 52%, rgba(60,40,20,0));}

.pageBase{position:absolute; top:0; height:100%; width:50%; overflow:hidden;
  background:linear-gradient(var(--paper),var(--paper-2));}
.pageBase.left{left:0; border-radius:6px 0 0 6px;
  box-shadow:inset -26px 0 42px -26px rgba(60,40,20,.55), 0 22px 50px rgba(0,0,0,.45);}
.lwrap{position:absolute; inset:0;}

/* ---------- leaves (flipping pages) ---------- */
.leaf{position:absolute; top:0; left:50%; width:50%; height:100%;
  transform-origin:left center; transform-style:preserve-3d; will-change:transform;
  transition:transform 1.15s cubic-bezier(.62,0,.28,1);}
.leaf.flip{transform:rotateY(-180deg);}
.leaf .face{position:absolute; inset:0; backface-visibility:hidden; -webkit-backface-visibility:hidden; overflow:hidden;
  background:linear-gradient(120deg,var(--paper) 0%,var(--paper-2) 100%);}
.leaf .front{border-radius:0 6px 6px 0; box-shadow:inset 26px 0 42px -26px rgba(60,40,20,.5);}
.leaf .back{transform:rotateY(180deg); border-radius:6px 0 0 6px;
  box-shadow:inset -26px 0 42px -26px rgba(60,40,20,.5);}

/* red / cover / final page variants (apply to any face or the static left base) */
.v-red,.v-cover,.v-final{background:radial-gradient(120% 100% at 30% 0%, var(--red-bright) 0%, var(--red) 42%, var(--red-deep) 100%) !important;}
.v-red .pg,.v-cover .pg,.v-final .pg{color:#F6E9C9;}

/* ---------- page content ---------- */
.pg{position:absolute; inset:0; padding:54px 50px 60px; display:flex; flex-direction:column;}
.pg.center{justify-content:center;}
.eyebrow{font-size:13px; letter-spacing:.22em; text-transform:uppercase; color:var(--gold-deep); font-weight:700;
  display:flex; align-items:center; gap:10px;}
.eyebrow::before{content:""; width:26px; height:2px; background:var(--gold-deep);}
.title{font-family:var(--serif); color:var(--red); font-weight:700; line-height:1.08; font-size:40px; margin:16px 0 4px; text-wrap:balance;}
.title.sm{font-size:32px;}
.lead{font-size:18.5px; color:var(--ink-soft); line-height:1.55; margin-top:14px; max-width:42ch;}
.rule{height:2px; width:70px; background:var(--gold); margin:20px 0 4px; border-radius:2px;}
.points{list-style:none; margin:0; padding:0; display:flex; flex-direction:column; gap:18px;}
.points li{position:relative; padding-left:30px; font-size:22px; line-height:1.34; color:var(--ink);}
.points li::before{content:""; position:absolute; left:2px; top:.52em; width:11px; height:11px;
  background:var(--gold); transform:rotate(45deg); box-shadow:0 0 0 3px rgba(201,162,75,.2);}
.points li b{color:var(--red); font-weight:700;}
.points li small{display:block; font-size:15px; color:var(--ink-faint); line-height:1.35; margin-top:3px;}
.callout{margin-top:20px; padding:18px 22px; border-left:4px solid var(--red);
  background:rgba(124,22,20,.06); border-radius:0 8px 8px 0; font-family:var(--serif);
  font-size:20px; line-height:1.45; color:var(--red-deep); font-style:italic;}
.callout b{font-style:normal;}
.motif{margin-top:auto; padding-top:26px;}
.motif svg{width:56px; height:56px; color:var(--gold); opacity:.5;}
.foot{margin-top:auto; display:flex; justify-content:space-between; align-items:center;
  font-size:12px; letter-spacing:.14em; text-transform:uppercase; color:var(--ink-faint);
  border-top:1px solid var(--line); padding-top:12px;}

/* grids */
.grid6{display:grid; grid-template-columns:1fr 1fr; gap:13px; margin:auto 0;}
.cell{background:rgba(255,255,255,.45); border:1px solid var(--line); border-radius:13px; padding:14px 15px 15px;
  box-shadow:0 6px 14px rgba(80,50,20,.06);}
.cell .k{font-family:var(--serif); color:var(--red); font-weight:700; font-size:18px; margin-bottom:4px;}
.cell .v{font-size:14.5px; line-height:1.34; color:var(--ink-soft);}
.grid8{display:flex; flex-direction:column; gap:15px; margin:auto 0;}
.pw{display:flex; gap:14px; align-items:flex-start;}
.pw .n{flex:none; width:34px; height:34px; border-radius:50%; background:var(--red); color:var(--gold-bright);
  font-family:var(--serif); font-weight:700; display:flex; align-items:center; justify-content:center; font-size:18px;
  box-shadow:0 3px 8px rgba(124,22,20,.35);}
.pw .t{font-size:17px; line-height:1.3; padding-top:4px;}

/* future timeline */
.tl{display:flex; flex-direction:column; gap:22px; margin:auto 0;}
.tl .row{display:flex; gap:18px; align-items:flex-start;}
.tl .yr{flex:none; width:70px; text-align:right; font-family:var(--serif); color:var(--red); font-weight:700; font-size:34px; line-height:1;}
.tl .dot{flex:none; position:relative; width:16px; align-self:stretch;}
.tl .dot::before{content:""; position:absolute; left:50%; top:6px; transform:translateX(-50%);
  width:14px; height:14px; border-radius:50%; background:var(--gold); border:3px solid var(--red); z-index:2;}
.tl .dot::after{content:""; position:absolute; left:50%; top:6px; bottom:-22px; transform:translateX(-50%); width:2px; background:var(--gold-deep); opacity:.5;}
.tl .row:last-child .dot::after{display:none;}
.tl .txt{font-size:16.5px; line-height:1.34; padding-top:5px;}
.tl .txt b{color:var(--red);} .tl .txt small{display:block; font-size:12px; color:var(--ink-faint); margin-top:2px;}

/* divider / cover / final layouts */
.divL{justify-content:center; align-items:flex-start;}
.divL .part{font-size:14px; letter-spacing:.3em; text-transform:uppercase; color:var(--gold-bright); font-weight:700;}
.divL .bignum{font-family:var(--serif); font-size:132px; line-height:.85; color:var(--gold-bright); text-shadow:0 6px 24px rgba(0,0,0,.35); margin-top:8px;}
.divR{justify-content:center;}
.divR h2{font-family:var(--serif); font-size:44px; line-height:1.05; margin:0; color:#FBF1D6; text-wrap:balance;}
.divR p{font-size:19px; color:#EBD9AE; margin:16px 0 0; max-width:38ch; line-height:1.5;}
.divR .rule{background:var(--gold-bright);}

.coverL{justify-content:center; align-items:center; text-align:center; gap:20px;}
.coverL .cstar{width:110px; height:110px; color:var(--gold-bright); filter:drop-shadow(0 6px 16px rgba(0,0,0,.4));}
.coverL .ceyebrow{font-size:12.5px; letter-spacing:.22em; text-transform:uppercase; color:var(--gold-bright); font-weight:700; line-height:1.7; max-width:26ch;}
.coverL .cyears{font-family:var(--serif); font-size:24px; letter-spacing:.24em; color:#EBD9AE;}
.coverR{justify-content:center;}
.coverR .ceb{font-size:12.5px; letter-spacing:.24em; text-transform:uppercase; color:var(--gold-bright); font-weight:700;}
.coverR h1{font-family:var(--serif); font-size:46px; line-height:1.1; margin:14px 0 0; color:#FBF1D6; text-wrap:balance; text-shadow:0 4px 18px rgba(0,0,0,.35);}
.coverR h1 span{display:block; color:var(--gold-bright); font-size:29px; margin-top:10px; font-weight:600;}
.coverR .chint{margin-top:28px; font-size:13px; letter-spacing:.14em; text-transform:uppercase; color:var(--gold-bright);
  display:flex; align-items:center; gap:8px; animation:pulse 2.4s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:.5}50%{opacity:1}}
.frameB{position:absolute; inset:22px; border:2px solid rgba(224,190,104,.5); border-radius:8px; pointer-events:none;}

.finalL{justify-content:center; align-items:center;}
.finalL svg{width:120px; height:120px; color:var(--gold-bright); filter:drop-shadow(0 6px 16px rgba(0,0,0,.4));}
.finalR{justify-content:center;}
.finalR h2{font-family:var(--serif); font-size:38px; color:#FBF1D6; margin:0; text-wrap:balance; line-height:1.18;}
.finalR p{color:#EBD9AE; font-size:18px; margin:16px 0 0;}
.finalR .team{margin-top:14px; font-size:14px; letter-spacing:.14em; text-transform:uppercase; color:var(--gold-bright);}

/* ---------- chrome ---------- */
.bar{position:fixed; left:0; right:0; bottom:0; height:4px; background:rgba(255,255,255,.12); z-index:40;}
.bar > i{display:block; height:100%; width:0; background:linear-gradient(90deg,var(--gold-deep),var(--gold-bright)); transition:width .5s cubic-bezier(.4,.05,.2,1);}
.ctrl{position:fixed; z-index:41; bottom:20px; left:50%; transform:translateX(-50%); display:flex; align-items:center; gap:14px;
  padding:8px 10px; border-radius:999px; background:rgba(30,12,10,.55); backdrop-filter:blur(8px);
  border:1px solid rgba(224,190,104,.28); color:#F3E4C3; font-size:13px;}
.ctrl button{all:unset; cursor:pointer; width:34px; height:34px; border-radius:50%; display:flex; align-items:center; justify-content:center;
  color:#F3E4C3; transition:background .2s, transform .1s;}
.ctrl button:hover{background:rgba(224,190,104,.18);} .ctrl button:active{transform:scale(.92);}
.ctrl button:focus-visible{outline:2px solid var(--gold-bright); outline-offset:2px;}
.ctrl .count{min-width:78px; text-align:center; font-variant-numeric:tabular-nums; font-family:var(--serif);}
.ctrl .count b{color:var(--gold-bright); font-size:16px;}
.fs{position:fixed; top:18px; right:18px; z-index:41; all:unset; cursor:pointer; width:40px; height:40px; border-radius:50%;
  display:flex; align-items:center; justify-content:center; background:rgba(30,12,10,.5); border:1px solid rgba(224,190,104,.28); color:#F3E4C3; backdrop-filter:blur(8px);}
.fs:hover{background:rgba(224,190,104,.18);} .fs:focus-visible{outline:2px solid var(--gold-bright); outline-offset:2px;}
.toast{position:fixed; top:18px; left:50%; transform:translateX(-50%); z-index:41; background:rgba(30,12,10,.6); color:#F3E4C3;
  border:1px solid rgba(224,190,104,.28); backdrop-filter:blur(8px); padding:9px 18px; border-radius:999px; font-size:13px; transition:opacity .6s;}
.toast.hide{opacity:0;}
.click-zone{position:absolute; top:0; height:100%; width:50%; z-index:800; cursor:pointer;}
.click-zone.next{right:0;} .click-zone.prev{left:0;}

/* ---------- professional motion ---------- */
@keyframes riseIn{from{opacity:0; transform:translateY(22px)} to{opacity:1; transform:none}}
@keyframes shadeFront{0%{opacity:0} 55%{opacity:.42} 100%{opacity:.16}}
@keyframes shadeBack{0%{opacity:.42} 55%{opacity:.30} 100%{opacity:0}}
.rvl{animation:riseIn .62s cubic-bezier(.2,.75,.25,1) both; will-change:transform,opacity;}
.leaf.turning .front::before,.leaf.turning .back::before{content:""; position:absolute; inset:0; pointer-events:none; z-index:6;
  background:linear-gradient(105deg, rgba(15,7,3,.85), rgba(15,7,3,.12));}
.leaf.turning .front::before{animation:shadeFront 1.15s cubic-bezier(.62,0,.28,1) both;}
.leaf.turning .back::before{animation:shadeBack 1.15s cubic-bezier(.62,0,.28,1) both;}

@media (prefers-reduced-motion: reduce){
  .leaf{transition:transform .01s linear;} .bar>i{transition:none;} .coverR .chint{animation:none;}
  .rvl,.leaf.turning .front::before,.leaf.turning .back::before{animation:none !important;}
}
@media (max-width:560px){ .ctrl{bottom:14px;} }
</style>
</head>
<body>

<svg width="0" height="0" style="position:absolute" aria-hidden="true">
  <symbol id="star" viewBox="0 0 100 100"><path fill="currentColor" d="M50 3l12.9 29.9 32.4 2.8-24.6 21.3 7.4 31.7L50 71.9 21.9 88.7l7.4-31.7L4.7 35.7l32.4-2.8z"/></symbol>
</svg>

<div class="viewport">
  <div class="stage" id="stage">
    <div class="book" id="book" aria-label="Bài thuyết trình dạng sách hai trang, dùng phím mũi tên để lật trang">
      <div class="pageBase left"><div class="lwrap" id="baseLeft"></div></div>
      <div class="spine"></div>
      <!-- leaves injected -->
    </div>
  </div>
</div>

<button class="fs" id="fsBtn" title="Toàn màn hình (F)" aria-label="Toàn màn hình">
  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 8V4h4M20 8V4h-4M4 16v4h4M20 16v4h-4"/></svg>
</button>

<div class="ctrl" role="group" aria-label="Điều khiển trình chiếu">
  <button id="prev" title="Trang trước (←)" aria-label="Trang trước"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 6l-6 6 6 6"/></svg></button>
  <div class="count"><b id="cur">1</b> / <span id="tot">21</span></div>
  <button id="next" title="Trang sau (→)" aria-label="Trang sau"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg></button>
</div>

<div class="bar"><i id="barfill"></i></div>
<div class="toast" id="toast">Phím <b>→</b> / <b>←</b> để lật trang · <b>F</b> toàn màn hình · Bấm nửa trái/phải để chuyển</div>

<script>
const STAR = '<svg viewBox="0 0 100 100"><use href="#star"/></svg>';
const F = (a,b)=>`<div class="foot"><span>${a}</span><span>${b}</span></div>`;

/* Each spread = an open two-page layout: {v, left, right} */
const spreads = [
{v:'cover',
 left:`<div class="pg coverL"><div class="frameB"></div>
    <div class="cstar">${STAR}</div>
    <div class="ceyebrow">Lịch sử Đảng Cộng sản Việt Nam · Chương 4</div>
    <div class="cyears">1991 — nay</div></div>`,
 right:`<div class="pg coverR"><div class="frameB"></div>
    <div class="ceb">Chủ đề thuyết trình</div>
    <h1>Cương lĩnh xây dựng đất nước<span>trong thời kỳ quá độ lên Chủ nghĩa xã hội</span></h1>
    <div class="chint">Lật trang để bắt đầu
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg></div></div>`},

{v:'',
 left:`<div class="pg opener"><div class="eyebrow">Nội dung trình bày</div>
    <div class="title">Bốn phần chính</div><div class="rule"></div>
    <div class="lead">Hành trình một tư duy lý luận không ngừng đổi mới nhưng luôn kiên định mục tiêu cốt lõi.</div>
    <div class="motif">${STAR}</div></div>`,
 right:`<div class="pg center"><ul class="points" style="gap:22px">
    <li><b>01 ·</b> Cương lĩnh 1991 — ra đời trong thử thách</li>
    <li><b>02 ·</b> Đại hội X (2006) — kiểm nghiệm &amp; bổ sung</li>
    <li><b>03 ·</b> Cương lĩnh 2011 — phát triển toàn diện <small>trọng tâm của bài</small></li>
    <li><b>04 ·</b> Liên hệ thực tiễn — thành tựu đổi mới</li>
    </ul>${F('Cương lĩnh · Quá độ lên CNXH','Mục lục')}</div>`},

{v:'red',
 left:`<div class="pg divL"><div class="part">Phần 01</div><div class="bignum">1991</div></div>`,
 right:`<div class="pg divR"><div class="rule"></div><h2>Cương lĩnh 1991</h2>
    <p>Ra đời trong thử thách lịch sử — Đại hội đại biểu toàn quốc lần thứ VII của Đảng.</p></div>`},

{v:'',
 left:`<div class="pg opener"><div class="eyebrow">Phần 1 · Bối cảnh ra đời</div>
    <div class="title sm">Vì sao vẫn chọn con đường CNXH?</div><div class="rule"></div>
    <div class="callout">Đó là sự sụp đổ của <b>một mô hình</b> — không phải sự phá sản của lý tưởng XHCN.</div>
    <div class="motif">${STAR}</div></div>`,
 right:`<div class="pg center"><ul class="points">
    <li>Liên Xô – Đông Âu <b>tan rã</b> (1989–1991)</li>
    <li>Thù địch đẩy mạnh <b>"diễn biến hòa bình"</b>, cho rằng CNXH đã "cáo chung"</li>
    <li>Trong nước vừa qua khủng hoảng, mới bước vào <b>Đổi mới (1986)</b></li>
    </ul>${F('Cương lĩnh 1991','Bối cảnh')}</div>`},

{v:'',
 left:`<div class="pg opener"><div class="eyebrow">Phần 1 · Nội dung cốt lõi</div>
    <div class="title sm">6 đặc trưng của xã hội XHCN</div><div class="rule"></div>
    <div class="callout">Mục tiêu: <b>Dân giàu, nước mạnh, xã hội công bằng, văn minh.</b></div>
    <div class="motif">${STAR}</div></div>`,
 right:`<div class="pg"><div class="grid6">
    <div class="cell"><div class="k">Chính trị</div><div class="v">Nhân dân lao động làm chủ</div></div>
    <div class="cell"><div class="k">Kinh tế</div><div class="v">LLSX hiện đại; công hữu TLSX chủ yếu</div></div>
    <div class="cell"><div class="k">Văn hóa</div><div class="v">Tiên tiến, đậm đà bản sắc dân tộc</div></div>
    <div class="cell"><div class="k">Con người</div><div class="v">Được giải phóng, phát triển toàn diện</div></div>
    <div class="cell"><div class="k">Dân tộc</div><div class="v">Bình đẳng, đoàn kết, cùng tiến bộ</div></div>
    <div class="cell"><div class="k">Đối ngoại</div><div class="v">Hữu nghị, hợp tác với các nước</div></div>
    </div>${F('Cương lĩnh 1991','6 đặc trưng')}</div>`},

{v:'red',
 left:`<div class="pg divL"><div class="part">Phần 02</div><div class="bignum">2006</div></div>`,
 right:`<div class="pg divR"><div class="rule"></div><h2>Đại hội X</h2>
    <p>Kiểm nghiệm và bổ sung Cương lĩnh qua 20 năm thực tiễn đổi mới.</p></div>`},

{v:'',
 left:`<div class="pg opener"><div class="eyebrow">Phần 2 · Điểm bổ sung</div>
    <div class="title sm">Đại hội X làm rõ thêm điều gì?</div><div class="rule"></div>
    <div class="lead">Thực tiễn kiểm nghiệm và làm phong phú thêm lý luận — đổi mới tư duy không ngừng.</div>
    <div class="motif">${STAR}</div></div>`,
 right:`<div class="pg center"><ul class="points">
    <li>Thêm chữ <b>"dân chủ"</b> vào mục tiêu <small>Dân giàu, nước mạnh, dân chủ, công bằng, văn minh</small></li>
    <li>Lần đầu khẳng định <b>Nhà nước pháp quyền XHCN</b> <small>của dân, do dân, vì dân</small></li>
    <li>Quan hệ sản xuất <b>linh hoạt</b> hơn, phù hợp trình độ lực lượng sản xuất</li>
    </ul>${F('Đại hội X · 2006','Bổ sung')}</div>`},

{v:'',

/* ---------- build the book ----------
   Real two-page model: leaf i front = spread i (right page),
   leaf i back = spread i+1 (left page). The static left base = spread 0 (left page). */
const book = document.getElementById('book');
const baseLeft = document.getElementById('baseLeft');
const N = spreads.length;
document.getElementById('tot').textContent = N;

baseLeft.className = 'lwrap ' + (spreads[0].v ? 'v-'+spreads[0].v : '');
baseLeft.innerHTML = spreads[0].left;

const leaves = [];
spreads.forEach((s,i)=>{
  const nextLeft = (i < N-1) ? spreads[i+1] : null;
  const frontV = s.v ? 'v-'+s.v : '';
  const backV  = nextLeft && nextLeft.v ? 'v-'+nextLeft.v : '';
  const leaf = document.createElement('div');
  leaf.className = 'leaf';
  leaf.innerHTML =
    `<div class="face front ${frontV}">${s.right}</div>`+
    `<div class="face back ${backV}">${nextLeft ? nextLeft.left : ''}</div>`;
  book.appendChild(leaf);
  leaves.push(leaf);
});

let cur = 0;          // current spread index
let flippingId = -1;  // leaf currently animating

function render(){
  leaves.forEach((leaf,i)=>{
    const flipped = i < cur;
    leaf.classList.toggle('flip', flipped);
    leaf.classList.toggle('turning', i===flippingId);
    let z = flipped ? (500 + i) : (200 + (N - i));
    if(i === flippingId) z = 1000;
    leaf.style.zIndex = z;
  });
  document.getElementById('cur').textContent = cur+1;
  document.getElementById('barfill').style.width = (cur/(N-1)*100)+'%';
}

/* staggered content entrance on a given .pg element */
function animatePg(pg){
  if(!pg) return;
  const gran = [...pg.querySelectorAll('.points li, .cell, .pw, .tl .row, .coverL > *, .coverR > *, .divL > *, .divR > *, .finalR > *')];
  const heads = ['.eyebrow','.title','.rule','.lead','.callout','.motif'].map(s=>pg.querySelector(s)).filter(Boolean);
  const seq = [], seen = new Set();
  [...heads, ...gran].forEach(el=>{ if(el && !seen.has(el)){ seen.add(el); seq.push(el); } });
  const targets = seq.length ? seq : [...pg.children].filter(c=>!c.classList.contains('frameB'));
  targets.forEach((el,i)=>{
    el.classList.remove('rvl');
    el.style.animationDelay = (0.30 + i*0.07)+'s';
    void el.offsetWidth;
    el.addEventListener('animationend', ()=>{ el.classList.remove('rvl'); el.style.animationDelay=''; }, {once:true});
    el.classList.add('rvl');
  });
}
function rightPg(s){ return leaves[s] ? leaves[s].querySelector('.front .pg') : null; }
function leftPg(s){ return s>0 ? (leaves[s-1] ? leaves[s-1].querySelector('.back .pg') : null) : baseLeft.querySelector('.pg'); }
function animateSpread(s){ animatePg(leftPg(s)); animatePg(rightPg(s)); }

function go(dir){
  const target = cur + dir;
  if(target < 0 || target > N-1) return;
  flippingId = dir > 0 ? cur : target;   // the leaf that physically turns
  cur = target;
  render();
  animatePg(rightPg(cur));               // the newly-facing right page rises in
}
function next(){ go(1); } function prev(){ go(-1); }

leaves.forEach(l=>l.addEventListener('transitionend', e=>{
  if(e.propertyName==='transform'){ flippingId=-1; render(); }
}));

/* ---------- controls ---------- */
document.getElementById('next').onclick = next;
document.getElementById('prev').onclick = prev;

const zNext = document.createElement('div'); zNext.className='click-zone next'; zNext.onclick=next;
const zPrev = document.createElement('div'); zPrev.className='click-zone prev'; zPrev.onclick=prev;
book.appendChild(zPrev); book.appendChild(zNext);

document.addEventListener('keydown', e=>{
  if(e.key==='ArrowRight'||e.key==='PageDown'||e.key===' '){ e.preventDefault(); next(); }
  else if(e.key==='ArrowLeft'||e.key==='PageUp'){ e.preventDefault(); prev(); }
  else if(e.key==='Home'){ cur=0; flippingId=-1; render(); animateSpread(cur); }
  else if(e.key==='End'){ cur=N-1; flippingId=-1; render(); animateSpread(cur); }
  else if(e.key==='f'||e.key==='F'){ toggleFs(); }
});

let sx=null;
book.addEventListener('touchstart',e=>sx=e.touches[0].clientX,{passive:true});
book.addEventListener('touchend',e=>{ if(sx===null)return; const dx=e.changedTouches[0].clientX-sx;
  if(Math.abs(dx)>40){ dx<0?next():prev(); } sx=null; });

function toggleFs(){ if(!document.fullscreenElement){ document.documentElement.requestFullscreen?.(); } else { document.exitFullscreen?.(); } }
document.getElementById('fsBtn').onclick = toggleFs;

const stage = document.getElementById('stage');
function fit(){ const s = Math.min((innerWidth*0.96)/1120, (innerHeight*0.86)/720); stage.style.transform = `scale(${s})`; }
addEventListener('resize', fit); fit();

setTimeout(()=>document.getElementById('toast').classList.add('hide'), 4600);

render();
animateSpread(0);
</script>
